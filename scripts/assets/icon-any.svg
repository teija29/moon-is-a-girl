  <rect width="512" height="512" fill="url(#bg)"/>

  <g fill="#F5EFE6" opacity="0.75">
    <circle cx="88" cy="120" r="2.2"/>
    <circle cx="420" cy="96" r="2.8"/>
    <circle cx="460" cy="380" r="2"/>
    <circle cx="72" cy="400" r="2.4"/>
    <circle cx="380" cy="440" r="1.8"/>
  </g>
  <g fill="#D4AF7A" opacity="0.6">
    <circle cx="140" cy="70" r="1.8"/>
